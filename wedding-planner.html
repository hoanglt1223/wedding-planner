<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Kế Hoạch Đám Cưới Việt Nam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#c0392b;--pri2:#e74c3c;--gold:#d4a843;--gold2:#f0d78c;--bg:#fdf6f0;--card:#fff;--text:#2c1810;--text2:#5a3e2b;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;--shadow:0 4px 20px rgba(0,0,0,.08)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:60px}
.ctn{max-width:920px;margin:0 auto;padding:10px}
.hdr{text-align:center;padding:28px 14px 18px;background:linear-gradient(135deg,#8b1a2b,var(--pri),#c0392b);color:#fff;border-radius:0 0 20px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.08),transparent 60%)}
.hdr h1{font-size:clamp(1.4rem,4.5vw,2rem);position:relative}
.hdr p{opacity:.85;font-size:clamp(.8rem,2.5vw,.95rem);position:relative;margin-top:4px}
.pbar{height:8px;background:rgba(255,255,255,.2);border-radius:4px;margin:10px 0 2px;overflow:hidden;position:relative}
.pfill{height:100%;background:linear-gradient(90deg,#f0d78c,#27ae60);border-radius:4px;transition:width .6s}
.ptxt{font-size:.75rem;opacity:.8;text-align:right;position:relative}

/* Summary */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sitem{text-align:center;padding:12px 6px;background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04)}
.sitem .n{font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:800;color:var(--pri)}
.sitem .l{font-size:.68rem;color:#888;margin-top:1px}

/* Tabs */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;border-radius:10px;border:2px solid #e0d0c0;background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;transition:.2s;white-space:nowrap}
.tab.a{background:var(--pri);color:#fff;border-color:var(--pri);transform:scale(1.03)}
.tab:hover:not(.a){border-color:var(--pri2);background:#fff5f5}

/* Panel */
.pnl{display:none;animation:fi .3s}.pnl.a{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Card */
.cd{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.03)}
.cd h2{font-size:1.05rem;color:var(--pri);display:flex;align-items:center;gap:7px;margin-bottom:2px}
.cd h3{font-size:.92rem;color:var(--text2);margin:12px 0 6px;padding-bottom:4px;border-bottom:1px dashed #e0d0c0}

/* Sub-ceremony tabs */
.stabs{display:flex;gap:4px;overflow-x:auto;margin:10px 0 8px;padding-bottom:4px;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:6px 12px;border-radius:8px;font-size:.73rem;font-weight:600;cursor:pointer;border:1.5px solid #e0d0c0;background:#fdf8f4;transition:.2s;white-space:nowrap}
.stab.a{background:var(--gold);color:#fff;border-color:var(--gold)}
.stab .opt{font-size:.6rem;opacity:.7;display:block;text-align:center}
.spnl{display:none;animation:fi .2s}.spnl.a{display:block}

/* Badges */
.bg{display:inline-block;padding:2px 7px;border-radius:5px;font-size:.67rem;font-weight:600;margin-left:4px}
.bg-r{background:#fde;color:var(--pri)}.bg-b{background:#e8f4fd;color:var(--blue)}
.bg-g{background:#e8fde8;color:var(--green)}.bg-gd{background:#fef8e8;color:#a07800}
.bg-p{background:#f3e8fd;color:var(--purple)}.bg-o{background:#fff3e0;color:#e65100}

/* Checklist */
.cl{list-style:none}.cl li{padding:9px 10px;border-radius:8px;margin:3px 0;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:.15s;background:#fafafa;font-size:.85rem;border:1px solid transparent}
.cl li:hover{background:#fff5f5;border-color:#f0d0c0}
.cl li.d{opacity:.5;text-decoration:line-through}
.cb{width:18px;height:18px;border-radius:5px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px}
.cl li.d .cb{background:var(--green);border-color:var(--green)}
.cb::after{content:'✓';font-size:11px;color:#fff;opacity:0;transition:.15s}
.cl li.d .cb::after{opacity:1}

/* Table */
.tb{width:100%;border-collapse:collapse;font-size:.82rem;margin:6px 0}
.tb th{background:var(--pri);color:#fff;padding:7px 8px;text-align:left;font-size:.75rem}
.tb td{padding:7px 8px;border-bottom:1px solid #f0e0d0}
.tb tr:nth-child(even){background:#fdf8f4}
.tb .c{color:var(--pri);font-weight:600;white-space:nowrap}

/* Timeline */
.tl{position:relative;padding-left:26px}.tl::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(var(--pri),var(--gold))}
.ti{position:relative;margin-bottom:16px}
.ti::before{content:'';position:absolute;left:-20px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--pri);border:2px solid #fff;box-shadow:0 0 0 2px var(--pri)}
.ti .tt{font-size:.73rem;color:var(--gold);font-weight:600}
.ti .td{font-size:.83rem;color:var(--text2);margin-top:1px}

/* People */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:6px;margin:6px 0}
.pp{text-align:center;padding:10px 6px;background:#fdf8f4;border-radius:10px;font-size:.78rem;border:1px solid #f0e0d0}
.pp .av{width:32px;height:32px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:.9rem}
.pp .nm{font-weight:600}.pp .rl{color:#888;font-size:.68rem}

/* Notes */
.nt{padding:9px 12px;border-radius:0 8px 8px 0;font-size:.82rem;margin:8px 0}
.nt-y{background:#fef9e7;border-left:3px solid var(--gold);color:#7d6608}
.nt-r{background:#fdeded;border-left:3px solid var(--pri);color:var(--pri)}
.nt-g{background:#e8f8f5;border-left:3px solid var(--green);color:#1a7a52}
.nt-b{background:#e8f0fd;border-left:3px solid var(--blue);color:#1a527a}

/* Budget */
.binp{width:100%;padding:12px 14px;border:2px solid #e0d0c0;border-radius:10px;font-size:1.05rem;text-align:center;font-weight:700;color:var(--pri);outline:none;margin:6px 0}
.binp:focus{border-color:var(--pri)}
.brow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0e8e0;font-size:.84rem}
.brow:last-child{border:none}
.bcat{font-weight:600;font-size:.82rem}
.bamt{color:var(--pri);font-weight:700;font-size:.9rem}
.bpct{font-size:.72rem;color:#888;min-width:32px;text-align:right}
.bedit{width:70px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;text-align:right;font-size:.82rem}
.bbar{height:7px;background:#eee;border-radius:4px;margin:3px 0;overflow:hidden}
.bfill{height:100%;border-radius:4px;transition:width .5s}
.bquick{text-align:center;font-size:.78rem;color:#888;margin:4px 0 10px}
.bquick span{cursor:pointer;color:var(--blue);margin:0 3px;font-weight:600}
.bquick span:hover{text-decoration:underline}

/* AI */
.ai{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:18px;color:#fff;margin-bottom:12px}
.ai h2{color:var(--gold2)}.ai h3{color:#fff;border-color:rgba(255,255,255,.15)}
.ai-inp{width:100%;padding:10px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(255,255,255,.07);color:#fff;font-size:.85rem;margin:4px 0;resize:vertical;min-height:50px}
.ai-inp::placeholder{color:rgba(255,255,255,.35)}
.ai-key{width:100%;padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:7px;background:rgba(255,255,255,.05);color:#fff;font-size:.82rem;margin:3px 0}
.ai-key::placeholder{color:rgba(255,255,255,.25)}
.ai-btns{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.ai-btn{padding:8px 14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.78rem;transition:.2s}
.ai-pri{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1a2e}
.ai-pri:hover{transform:scale(1.03)}
.ai-sec{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18)}
.ai-sec:hover{background:rgba(255,255,255,.18)}
.ai-res{margin-top:10px;padding:12px;background:rgba(255,255,255,.05);border-radius:8px;font-size:.84rem;line-height:1.7;max-height:350px;overflow-y:auto;white-space:pre-wrap}
.ai-ld{text-align:center;padding:16px;color:var(--gold2)}
.dots::after{content:'...';animation:dt 1.5s infinite}
@keyframes dt{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* Save indicator */
.save-ind{position:fixed;bottom:12px;right:12px;background:var(--green);color:#fff;padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:600;opacity:0;transition:opacity .3s;z-index:99;pointer-events:none}
.save-ind.show{opacity:1}

@media(max-width:640px){
 .ctn{padding:6px}
 .cd{padding:12px;border-radius:10px}
 .hdr{padding:18px 10px 14px;border-radius:0 0 14px 14px}
 .tab{padding:7px 10px;font-size:.7rem}
 .sgrid{grid-template-columns:repeat(2,1fr)}
 .pgrid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}
 .brow{font-size:.78rem}.bedit{width:60px}
 .stab{padding:5px 9px;font-size:.68rem}
}
@media print{.tabs,.ai,.tab,.stabs{display:none!important}.pnl,.spnl{display:block!important}.cd{break-inside:avoid;box-shadow:none;border:1px solid #ddd}}
</style>
</head>

// ============= STATE =============
let S;
const SK='wdp_state_v3';
function loadS(){
 try{S=JSON.parse(localStorage.getItem(SK))}catch(e){}
 if(!S) S={tab:0,stab:{},ck:{},budget:200000000,bo:{},zk:'',air:''};
}
function saveS(){
 try{localStorage.setItem(SK,JSON.stringify(S));showSave()}catch(e){}
}
function showSave(){const el=document.getElementById('saveInd');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200)}

// ============= UTILS =============
const fm=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n));
const fmS=n=>{
 if(n>=1e9)return(n/1e9).toFixed(1).replace('.0','')+'tỷ';
 if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'tr';
 if(n>=1e3)return(n/1e3).toFixed(0)+'k';
 return n+'đ';
};

function getAllCk(){
 let t=0,d=0;
 D.steps.forEach(s=>s.ceremonies.forEach((c,ci)=>c.checklist.forEach((_,i)=>{t++;if(S.ck[s.id+'_'+ci+'_'+i])d++})));
 return{t,d};
}

// ============= RENDER =============
function render(){
 renderSum();renderTabs();renderPanels();
}

function renderSum(){
 const{t,d}=getAllCk();
 const pct=t?Math.round(d/t*100):0;
 document.getElementById('sg').innerHTML=`
  <div class="sitem"><div class="n">${D.steps.length}</div><div class="l">Bước chính</div></div>
  <div class="sitem"><div class="n">${d}/${t}</div><div class="l">Hoàn thành</div></div>
  <div class="sitem"><div class="n">${fmS(S.budget)}</div><div class="l">Ngân sách</div></div>
  <div class="sitem"><div class="n">${pct}%</div><div class="l">Tiến độ</div></div>`;
 document.getElementById('mp').style.width=pct+'%';
 document.getElementById('mpt').textContent=`${pct}% hoàn thành (${d}/${t} việc)`;
}

function renderTabs(){
 const ts=D.steps.map((s,i)=>`<div class="tab${i===S.tab?' a':''}" onclick="sTab(${i})">${s.tab}</div>`);
 ts.push(`<div class="tab${S.tab===D.steps.length?' a':''}" onclick="sTab(${D.steps.length})">💰 Ngân Sách</div>`);
 ts.push(`<div class="tab${S.tab===D.steps.length+1?' a':''}" onclick="sTab(${D.steps.length+1})">🤖 AI</div>`);
 document.getElementById('tabs').innerHTML=ts.join('');
}

function renderPanels(){
 let h='';
 D.steps.forEach((step,si)=>{
  const act=si===S.tab;
  h+=`<div class="pnl${act?' a':''}" data-p="${si}">`;
  // Header
  let sc=0,sd=0;step.ceremonies.forEach((c,ci)=>c.checklist.forEach((_,i)=>{sc++;if(S.ck[step.id+'_'+ci+'_'+i])sd++}));
  const sp=sc?Math.round(sd/sc*100):0;
  h+=`<div class="cd"><h2>${step.icon} ${step.title}</h2><p style="color:var(--text2);font-size:.88rem;margin:3px 0">${step.desc}</p>
   <span class="bg bg-b">⏰ ${step.timeline}</span>
   <div class="pbar" style="margin-top:10px"><div class="pfill" style="width:${sp}%"></div></div>
   <div style="font-size:.75rem;color:#888;text-align:right">${sd}/${sc} (${sp}%)</div></div>`;

  // Sub ceremony tabs
  const cst=S.stab[step.id]||0;
  h+=`<div class="stabs">`;
  step.ceremonies.forEach((c,ci)=>{
   const req=c.required;
   h+=`<div class="stab${ci===cst?' a':''}" onclick="sSTab('${step.id}',${ci})">${c.name}${req?'':'<span class="opt">(không bắt buộc)</span>'}</div>`;
  });
  h+=`</div>`;

  // Sub panels
  step.ceremonies.forEach((cer,ci)=>{
   const cact=ci===cst;
   h+=`<div class="spnl${cact?' a':''}" data-sp="${step.id}_${ci}">`;

   // Description
   h+=`<div class="cd"><h2>${cer.name} ${cer.required?'<span class="bg bg-r">BẮT BUỘC</span>':'<span class="bg bg-o">KHÔNG BẮT BUỘC</span>'}</h2>
    <p style="font-size:.85rem;color:var(--text2);margin:4px 0">${cer.desc}</p></div>`;

   // People
   if(cer.people?.length){
    h+=`<div class="cd"><h2>👥 Ai Có Mặt</h2><div class="pgrid">${cer.people.map(p=>`<div class="pp"><div class="av">${p.a}</div><div class="nm">${p.n}</div><div class="rl">${p.r}</div></div>`).join('')}</div></div>`;
   }

   // Checklist
   if(cer.checklist?.length){
    h+=`<div class="cd"><h2>✅ Checklist</h2><ul class="cl">`;
    cer.checklist.forEach((c,i)=>{
     const key=step.id+'_'+ci+'_'+i;
     const dn=S.ck[key]?'d':'';
     const cb=c.c>0?`<span class="bg bg-gd">${fmS(c.c)}</span>`:'';
     h+=`<li class="${dn}" onclick="tCk('${key}',this)"><span class="cb"></span><span>${c.t} ${cb}</span></li>`;
    });
    h+=`</ul></div>`;
   }

   // Lễ vật
   if(cer.levat?.length){
    const tl=cer.levat.reduce((a,b)=>a+b.c,0);
    h+=`<div class="cd"><h2>🎁 Lễ Vật Chi Tiết</h2>
     <div class="nt nt-y">Tổng ước tính: <strong>${fm(tl)}đ</strong></div>
     <table class="tb"><thead><tr><th>Lễ vật</th><th>SL</th><th>Chi phí</th><th>Ghi chú</th></tr></thead><tbody>
     ${cer.levat.map(l=>`<tr><td><strong>${l.n}</strong></td><td>${l.q}</td><td class="c">${l.c?fm(l.c)+'đ':'Thỏa thuận'}</td><td style="font-size:.78rem;color:#888">${l.nt}</td></tr>`).join('')}
     </tbody></table></div>`;
   }

   // Rituals
   if(cer.rituals?.length){
    h+=`<div class="cd"><h2>🎎 Trình Tự Nghi Thức</h2><div class="tl">`;
    cer.rituals.forEach((r,ri)=>{h+=`<div class="ti"><div class="tt">Bước ${ri+1}</div><div class="td">${r}</div></div>`});
    h+=`</div></div>`;
   }

   // Tips
   if(cer.tips?.length){
    h+=`<div class="cd"><h2>💡 Mẹo & Lưu Ý</h2>${cer.tips.map(t=>`<div class="nt nt-g">💡 ${t}</div>`).join('')}</div>`;
   }

   h+=`</div>`; // spnl
  });

  h+=`</div>`; // pnl
 });

 // Budget panel
 h+=renderBudget();

 // AI panel
 h+=renderAI();

 document.getElementById('panels').innerHTML=h;
}

function renderBudget(){
 const idx=D.steps.length;
 const act=idx===S.tab;
 let h=`<div class="pnl${act?' a':''}" data-p="${idx}">`;
 h+=`<div class="cd"><h2>💰 Ngân Sách Tổng Thể</h2>
  <p style="font-size:.83rem;color:var(--text2)">Nhập tổng ngân sách → hệ thống tự phân bổ theo tỷ lệ chuẩn</p>
  <input type="text" class="binp" id="bi" value="${fm(S.budget)}" oninput="uBud(this)" onfocus="this.select()">
  <div class="bquick">Nhanh: <span onclick="sBud(100000000)">100tr</span>|<span onclick="sBud(150000000)">150tr</span>|<span onclick="sBud(200000000)">200tr</span>|<span onclick="sBud(300000000)">300tr</span>|<span onclick="sBud(500000000)">500tr</span>|<span onclick="sBud(1000000000)">1tỷ</span></div>`;

 D.budgetCats.forEach(cat=>{
  const p=S.bo[cat.k]!==undefined?S.bo[cat.k]:cat.p;
  const a=S.budget*p/100;
  h+=`<div class="brow"><span class="bcat">${cat.l}</span>
   <div style="display:flex;align-items:center;gap:6px">
    <input type="number" class="bedit" value="${p}" min="0" max="100" onchange="uCat('${cat.k}',this.value)">
    <span class="bpct">%</span>
    <span class="bamt">${fmS(a)}</span>
   </div></div>
  <div class="bbar"><div class="bfill" style="width:${p}%;background:${cat.c}"></div></div>`;
 });

 let up=D.budgetCats.reduce((a,c)=>a+(S.bo[c.k]!==undefined?S.bo[c.k]:c.p),0);
 let ua=S.budget*up/100;
 h+=`<div style="margin-top:10px;padding:12px;background:#f8f8f8;border-radius:10px;text-align:center">
  <div style="font-size:.85rem">Phân bổ: <strong>${up}%</strong> = <strong style="color:var(--pri)">${fm(ua)}đ</strong></div>
  <div style="font-size:.85rem;color:${S.budget-ua>=0?'var(--green)':'var(--pri)'}">Còn lại: <strong>${fm(S.budget-ua)}đ</strong></div></div>`;

 h+=`<h3 style="margin-top:14px">📊 Ước Tính Theo Bước</h3>`;
 D.steps.forEach(step=>{
  let sc=0;
  step.ceremonies.forEach(c=>{c.checklist.forEach(x=>sc+=x.c);if(c.levat)c.levat.forEach(l=>sc+=l.c)});
  const pct=S.budget>0?Math.round(sc/S.budget*100):0;
  h+=`<div class="brow"><span class="bcat">${step.icon} ${step.tab.replace(/[^\w\s\u00C0-\u024F\u1E00-\u1EFF]/g,'').trim()}</span><span class="bamt">${fmS(sc)} <span class="bpct">(${pct}%)</span></span></div>`;
 });

 h+=`</div></div>`;
 return h;
}

function renderAI(){
 const idx=D.steps.length+1;
 const act=idx===S.tab;
 let h=`<div class="pnl${act?' a':''}" data-p="${idx}">`;
 h+=`<div class="ai"><h2>🤖 AI Hỗ Trợ Đám Cưới (Z.AI)</h2>
  <p style="font-size:.82rem;opacity:.65;margin:3px 0">Dùng AI tạo kịch bản, gợi ý menu, lễ vật, ngày cưới và nhiều hơn nữa</p>
  <h3 style="font-size:.88rem;margin-top:12px">🔑 API Key (lưu localStorage)</h3>
  <input type="password" class="ai-key" id="zki" placeholder="Nhập ZAI API Key (bigmodel.cn)..." value="${S.zk}" onchange="sZk(this.value)">
  <div style="font-size:.7rem;opacity:.5;margin:2px 0">Model: glm-4-flash | Endpoint: open.bigmodel.cn</div>
  <h3 style="font-size:.88rem;margin-top:10px">⚡ Gợi Ý Nhanh</h3>
  <div class="ai-btns">${D.aiPrompts.map((p,i)=>`<button class="ai-btn ai-sec" onclick="rAI(${i})">${p.l}</button>`).join('')}</div>
  <h3 style="font-size:.88rem;margin-top:10px">✍️ Câu Hỏi Tùy Chỉnh</h3>
  <textarea class="ai-inp" id="aip" placeholder="VD: Gợi ý nhà hàng tiệc cưới ở Sài Gòn dưới 2 triệu/bàn..."></textarea>
  <div class="ai-btns">
   <button class="ai-btn ai-pri" onclick="rCA()">🚀 Gửi AI</button>
   <button class="ai-btn ai-sec" onclick="cAI()">🗑️ Xóa</button>
  </div>
  <div class="ai-res" id="air" style="display:${S.air?'block':'none'}">${S.air?fmtAI(S.air):''}</div>
 </div>`;

 h+=`<div class="cd"><h2>📖 Hướng Dẫn</h2>
  <div class="nt nt-b"><strong>B1:</strong> Nhập API Key từ <a href="https://open.bigmodel.cn" target="_blank" style="color:var(--blue)">open.bigmodel.cn</a><br>
  <strong>B2:</strong> Chọn gợi ý nhanh hoặc nhập câu hỏi<br>
  <strong>B3:</strong> AI trả lời dựa trên prompt tối ưu cho đám cưới VN</div>
  <div class="nt nt-g">💡 API Key được lưu trong localStorage — không cần nhập lại.</div>
  <div class="nt nt-y">⚠️ Mỗi lần gọi tốn token. Đảm bảo key có đủ quota.</div></div>`;

 h+=`</div>`;
 return h;
}

// ============= ACTIONS =============
function sTab(i){S.tab=i;saveS();renderTabs();document.querySelectorAll('.pnl').forEach((p,pi)=>p.classList.toggle('a',pi===i));window.scrollTo({top:document.getElementById('tabs').offsetTop-8,behavior:'smooth'})}

function sSTab(sid,ci){
 S.stab[sid]=ci;saveS();
 // Toggle sub panels for this step
 const stepIdx=D.steps.findIndex(s=>s.id===sid);
 const pnl=document.querySelectorAll('.pnl')[stepIdx];
 if(!pnl)return;
 pnl.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('a',i===ci));
 pnl.querySelectorAll('.spnl').forEach((p,i)=>p.classList.toggle('a',i===ci));
}

function tCk(k,el){S.ck[k]=!S.ck[k];el.classList.toggle('d');saveS();renderSum()}

function uBud(el){const v=el.value.replace(/\D/g,'');S.budget=parseInt(v)||0;el.value=fm(S.budget);saveS();/* Don't re-render full, just save */}
function sBud(v){S.budget=v;saveS();render();sTab(S.tab)}
function uCat(k,v){S.bo[k]=parseFloat(v)||0;saveS()}

function sZk(v){S.zk=v.trim();saveS()}

function fmtAI(t){
 return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
  .replace(/^### (.*$)/gm,'<h4 style="color:var(--gold);margin:8px 0 3px">$1</h4>')
  .replace(/^## (.*$)/gm,'<h3 style="color:var(--gold);margin:10px 0 4px">$1</h3>')
  .replace(/^# (.*$)/gm,'<h2 style="color:var(--gold2);margin:12px 0 5px">$1</h2>')
  .replace(/^[-*] (.*$)/gm,'<div style="padding:1px 0 1px 10px;border-left:2px solid rgba(255,255,255,.12)">• $1</div>')
  .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

async function callAI(prompt){
 if(!S.zk){alert('Vui lòng nhập ZAI API Key!');return}
 const r=document.getElementById('air');
 r.style.display='block';
 r.innerHTML='<div class="ai-ld">🤖 AI đang xử lý<span class="dots"></span></div>';
 const sys=`Bạn là chuyên gia tư vấn đám cưới Việt Nam 20 năm kinh nghiệm. Hiểu rõ phong tục 3 miền Bắc-Trung-Nam. Trả lời chi tiết, thực tế, có số liệu & giá VNĐ. Format rõ ràng: tiêu đề ##, gạch đầu dòng -, bold **. Ngân sách khách: ${fmS(S.budget)}.`;
 try{
  const res=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{
   method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.zk},
   body:JSON.stringify({model:'glm-4-flash',messages:[{role:'system',content:sys},{role:'user',content:prompt}],max_tokens:2000,temperature:.7})
  });
  if(!res.ok)throw new Error(`API ${res.status}: ${await res.text()}`);
  const d=await res.json();
  const txt=d.choices?.[0]?.message?.content||'Không nhận được phản hồi.';
  S.air=txt;r.innerHTML=fmtAI(txt);saveS();
 }catch(e){r.innerHTML=`<div style="color:#ff6b6b">❌ ${e.message}</div><div style="font-size:.78rem;opacity:.6;margin-top:6px">Kiểm tra API Key & kết nối mạng.</div>`}
}

function rAI(i){const p=D.aiPrompts[i];document.getElementById('aip').value=p.p;callAI(p.p)}
function rCA(){const p=document.getElementById('aip').value.trim();if(!p){alert('Nhập câu hỏi!');return}callAI(p)}
function cAI(){S.air='';const r=document.getElementById('air');if(r){r.style.display='none';r.innerHTML=''}saveS()}

// ============= INIT =============
loadS();render();sTab(S.tab);
</script>
</body>
</html>
