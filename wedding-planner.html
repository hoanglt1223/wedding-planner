<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#c0392b;--p2:#e74c3c;--g:#d4a843;--g2:#f0d78c;--bg:#fdf6f0;--cd:#fff;--t:#2c1810;--t2:#5a3e2b;--gn:#27ae60;--bl:#2980b9;--pp:#8e44ad;--sh:0 4px 15px rgba(0,0,0,.07)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.ctn{max-width:920px;margin:0 auto;padding:8px}
.hd{text-align:center;padding:22px 12px 16px;background:linear-gradient(135deg,#8b1a2b,var(--p));color:#fff;border-radius:0 0 18px 18px;margin-bottom:12px}
.hd h1{font-size:clamp(1.3rem,4vw,1.9rem)}.hd p{opacity:.8;font-size:.82rem;margin-top:3px}
.pb{height:7px;background:rgba(255,255,255,.2);border-radius:4px;margin:8px 0 2px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--g2),var(--gn));border-radius:4px;transition:width .5s}
.pt{font-size:.72rem;opacity:.75;text-align:right}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.si{text-align:center;padding:10px 4px;background:#fff;border-radius:10px;box-shadow:var(--sh)}
.si .n{font-size:clamp(1rem,3vw,1.3rem);font-weight:800;color:var(--p)}.si .l{font-size:.65rem;color:#888}
.tabs{display:flex;gap:4px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tb-i{flex-shrink:0;padding:8px 12px;border-radius:9px;border:2px solid #e0d0c0;background:#fff;cursor:pointer;font-size:.72rem;font-weight:600;transition:.2s;white-space:nowrap}
.tb-i.a{background:var(--p);color:#fff;border-color:var(--p)}
.pn{display:none;animation:fi .25s}.pn.a{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.c{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.03)}
.c h2{font-size:1rem;color:var(--p);display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.c h3{font-size:.88rem;color:var(--t2);margin:10px 0 5px;padding-bottom:3px;border-bottom:1px dashed #e0d0c0}
.st{display:flex;gap:3px;overflow-x:auto;margin:8px 0 6px;scrollbar-width:none}.st::-webkit-scrollbar{display:none}
.st-i{flex-shrink:0;padding:5px 10px;border-radius:7px;font-size:.7rem;font-weight:600;cursor:pointer;border:1.5px solid #e0d0c0;background:#fdf8f4;transition:.15s;white-space:nowrap}
.st-i.a{background:var(--g);color:#fff;border-color:var(--g)}
.st-i .op{font-size:.58rem;opacity:.65;display:block}
.sp{display:none;animation:fi .2s}.sp.a{display:block}
.bg-t{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.64rem;font-weight:600;margin-left:3px}
.bg-r{background:#fde;color:var(--p)}.bg-b{background:#e8f4fd;color:var(--bl)}.bg-g{background:#e8fde8;color:var(--gn)}.bg-gd{background:#fef8e8;color:#a07800}.bg-o{background:#fff3e0;color:#e65100}
.cl{list-style:none}.cl li{padding:8px 9px;border-radius:7px;margin:2px 0;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:.12s;background:#fafafa;font-size:.82rem;border:1px solid transparent}
.cl li:hover{background:#fff5f5;border-color:#f0d0c0}.cl li.d{opacity:.45;text-decoration:line-through}
.ck{width:17px;height:17px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.cl li.d .ck{background:var(--gn);border-color:var(--gn)}.ck::after{content:'✓';font-size:10px;color:#fff;opacity:0}.cl li.d .ck::after{opacity:1}
.tbl{width:100%;border-collapse:collapse;font-size:.78rem;margin:5px 0}
.tbl th{background:var(--p);color:#fff;padding:6px 7px;text-align:left;font-size:.72rem}
.tbl td{padding:6px 7px;border-bottom:1px solid #f0e0d0}.tbl tr:nth-child(even){background:#fdf8f4}.tbl .ct{color:var(--p);font-weight:600}
.tl{position:relative;padding-left:22px}.tl::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(var(--p),var(--g))}
.ti{position:relative;margin-bottom:14px}.ti::before{content:'';position:absolute;left:-17px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--p);border:2px solid #fff;box-shadow:0 0 0 2px var(--p)}
.ti .tt{font-size:.7rem;color:var(--g);font-weight:600}.ti .td{font-size:.8rem;color:var(--t2)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;margin:5px 0}
.pp{text-align:center;padding:8px 4px;background:#fdf8f4;border-radius:8px;font-size:.75rem;border:1px solid #f0e0d0}
.pp .av{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:.8rem}
.pp .nm{font-weight:600;font-size:.72rem}.pp .rl{color:#888;font-size:.65rem}
.nt{padding:8px 10px;border-radius:0 7px 7px 0;font-size:.8rem;margin:6px 0}
.nt-y{background:#fef9e7;border-left:3px solid var(--g);color:#7d6608}
.nt-r{background:#fdeded;border-left:3px solid var(--p);color:var(--p)}
.nt-g{background:#e8f8f5;border-left:3px solid var(--gn);color:#1a7a52}
.nt-b{background:#e8f0fd;border-left:3px solid var(--bl);color:#1a527a}
.inp{width:100%;padding:10px 12px;border:2px solid #e0d0c0;border-radius:9px;font-size:.92rem;outline:none;margin:4px 0}
.inp:focus{border-color:var(--p)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.78rem;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{opacity:.9}

.btn-ai{background:linear-gradient(135deg,#1a1a2e,#16213e);color:var(--g2);font-size:.7rem;padding:5px 10px;border-radius:6px}
.btn-ai:hover{opacity:.85}
.ai{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:16px;color:#fff;margin-bottom:10px}

.ai-t{resize:vertical;min-height:45px}
.ai-bs{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0}
.ai-b{padding:7px 12px;border:none;border-radius:7px;font-weight:600;cursor:pointer;font-size:.73rem;transition:.15s}

.ai-2{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.ai-r{margin-top:8px;padding:10px;background:rgba(255,255,255,.05);border-radius:7px;font-size:.8rem;line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap}
.sv{position:fixed;bottom:10px;right:10px;background:var(--gn);color:#fff;padding:5px 12px;border-radius:7px;font-size:.75rem;font-weight:600;opacity:0;transition:opacity .3s;z-index:99;pointer-events:none}.sv.sh{opacity:1}

.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin:8px 0}
.tp-c{border-radius:16px;padding:24px 18px;text-align:center;position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center}

.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin:8px 0}
.bg-c{border-radius:14px;padding:20px 14px;text-align:center;min-height:160px;display:flex;flex-direction:column;justify-content:center;color:#fff;position:relative;overflow:hidden}
.bg-c::before{content:'';position:absolute;inset:0;opacity:.12;pointer-events:none}
.flex-r{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
select.inp{padding:8px 10px}
textarea.inp{resize:vertical;min-height:50px}
.idea-c{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;padding:16px;color:#fff;margin-bottom:10px}
.idea-c h2{color:#fff}
.idea-i{padding:10px;background:rgba(255,255,255,.1);border-radius:8px;margin:5px 0;font-size:.82rem}
.idea-i b{color:var(--g2)}
@media(max-width:640px){.ctn{padding:5px}.c{padding:11px}.sg{grid-template-columns:repeat(2,1fr)}.tb-i{padding:6px 9px;font-size:.68rem}.pg{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}.tp-grid{grid-template-columns:1fr}.bg-grid{grid-template-columns:1fr}}
@media print{.tabs,.ai,.tb-i,.st,.sv,.btn,.no-print,.btn-ai{display:none!important}.pn,.sp{display:block!important}.c{break-inside:avoid;box-shadow:none;border:1px solid #ddd}body{background:#fff;font-size:11px}}
</style>

let S;const SK='wp_v7';
function ld(){try{S=JSON.parse(localStorage.getItem(SK))}catch(e){}
if(!S)S={tab:0,st:{},ck:{},bud:200000000,bo:{},zk:'',ar:'',info:{bride:'Nguyễn Thị A',groom:'Trần Văn B',bf:'Họ Nguyễn',gf:'Họ Trần',date:'2025-12-20',dDN:'2025-10-15',dDH:'2025-11-15'},guests:[],gid:0}}
function sv(){try{localStorage.setItem(SK,JSON.stringify(S));const e=document.getElementById('sv');e.classList.add('sh');setTimeout(()=>e.classList.remove('sh'),800)}catch(e){}}
const fm=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n));
const fs=n=>{if(n>=1e9)return(n/1e9).toFixed(1).replace('.0','')+'tỷ';if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'tr';if(n>=1e3)return(n/1e3).toFixed(0)+'k';return n+''};
function gCk(){let t=0,d=0;D.steps.forEach(s=>s.cers.forEach((c,ci)=>c.cl.forEach((_,i)=>{t++;if(S.ck[s.id+'_'+ci+'_'+i])d++})));return{t,d}}
const ET=['💰 Chi Phí','👥 Khách Mời','🖼️ BG & Thiệp','🤖 AI','📖 Sổ Tay','💡 Ý Tưởng'];

function R(){
const{t,d}=gCk();const p=t?Math.round(d/t*100):0;
document.getElementById('sg').innerHTML=`<div class="si"><div class="n">${D.steps.length}</div><div class="l">Bước</div></div><div class="si"><div class="n">${d}/${t}</div><div class="l">Xong</div></div><div class="si"><div class="n">${fs(S.bud)}</div><div class="l">Budget</div></div><div class="si"><div class="n">${p}%</div><div class="l">Tiến độ</div></div>`;
document.getElementById('mp').style.width=p+'%';document.getElementById('mpt').textContent=p+'% ('+d+'/'+t+')';
let tabs='';D.steps.forEach((s,i)=>tabs+=`<div class="tb-i${i===S.tab?' a':''}" onclick="sT(${i})">${s.tab}</div>`);
ET.forEach((_,i)=>{const idx=D.steps.length+i;tabs+=`<div class="tb-i${idx===S.tab?' a':''}" onclick="sT(${idx})">${ET[i]}</div>`});
document.getElementById('tabs').innerHTML=tabs;
let h='';D.steps.forEach((s,si)=>h+=rS(s,si));
h+=rCost()+rGuest()+rBGThiep()+rAI()+rPrint()+rIdea();
document.getElementById('pns').innerHTML=h}

function rS(s,si){
let h=`<div class="pn${si===S.tab?' a':''}">`;
let sc=0,sd=0;s.cers.forEach((c,ci)=>c.cl.forEach((_,i)=>{sc++;if(S.ck[s.id+'_'+ci+'_'+i])sd++}));const sp=sc?Math.round(sd/sc*100):0;
h+=`<div class="c"><h2>${s.icon} ${s.title}</h2><p style="font-size:.84rem;color:var(--t2)">${s.desc}</p><span class="bg-t bg-b">⏰ ${s.tm}</span>`;
if(s.aiHint)h+=` <button class="btn btn-ai" onclick="goAI(\`${s.aiHint}\`)">🤖 Hỏi AI</button>`;
h+=`<div class="pb" style="margin-top:8px"><div class="pf" style="width:${sp}%"></div></div><div style="font-size:.72rem;color:#888;text-align:right">${sd}/${sc} (${sp}%)</div></div>`;
const cs=S.st[s.id]||0;
h+=`<div class="st">${s.cers.map((c,ci)=>`<div class="st-i${ci===cs?' a':''}" onclick="sST('${s.id}',${ci})">${c.nm}${c.req?'':'<span class="op">(tùy chọn)</span>'}</div>`).join('')}</div>`;
s.cers.forEach((cr,ci)=>{
h+=`<div class="sp${ci===cs?' a':''}" data-sp="${s.id}_${ci}">`;
h+=`<div class="c"><h2>${cr.nm} ${cr.req?'<span class="bg-t bg-r">BẮT BUỘC</span>':'<span class="bg-t bg-o">TÙY CHỌN</span>'}</h2><p style="font-size:.82rem;color:var(--t2)">${cr.desc}</p></div>`;
if(cr.pp?.length)h+=`<div class="c"><h2>👥 Ai Có Mặt</h2><div class="pg">${cr.pp.map(p=>`<div class="pp"><div class="av">${p.a}</div><div class="nm">${p.n}</div><div class="rl">${p.r}</div></div>`).join('')}</div></div>`;
if(cr.cl?.length)h+=`<div class="c"><h2>✅ Checklist</h2><ul class="cl">${cr.cl.map((c,i)=>`<li class="${S.ck[s.id+'_'+ci+'_'+i]?'d':''}" onclick="tC('${s.id+'_'+ci+'_'+i}',this)"><span class="ck"></span><span>${c.t}${c.c?` <span class="bg-t bg-gd">${fs(c.c)}</span>`:''}</span></li>`).join('')}</ul></div>`;
if(cr.lv?.length){const tl=cr.lv.reduce((a,b)=>a+b.c,0);h+=`<div class="c"><h2>🎁 Lễ Vật</h2><div class="nt nt-y">Tổng: <b>${fm(tl)}đ</b></div><table class="tbl"><tr><th>Tên</th><th>SL</th><th>Giá</th></tr>${cr.lv.map(l=>`<tr><td><b>${l.n}</b></td><td>${l.q}</td><td class="ct">${l.c?fm(l.c)+'đ':'—'}</td></tr>`).join('')}</table></div>`}
if(cr.ri?.length)h+=`<div class="c"><h2>🎎 Trình Tự</h2><div class="tl">${cr.ri.map((r,i)=>`<div class="ti"><div class="tt">Bước ${i+1}</div><div class="td">${r}</div></div>`).join('')}</div></div>`;
if(cr.tp?.length)h+=`<div class="c"><h2>💡 Lưu Ý</h2>${cr.tp.map(t=>`<div class="nt nt-g">💡 ${t}</div>`).join('')}</div>`;
h+=`</div>`});return h+'</div>'}

function rCost(){const idx=D.steps.length;let h=`<div class="pn${idx===S.tab?' a':''}"><div class="c"><h2>💰 Ngân Sách</h2>
<input class="inp" style="text-align:center;font-weight:700;color:var(--p);font-size:1rem" value="${fm(S.bud)}" oninput="uB(this)" onfocus="this.select()">
<div style="text-align:center;font-size:.75rem;color:#888;margin:4px 0">${[100,150,200,300,500].map(v=>`<span style="cursor:pointer;color:var(--bl);font-weight:600" onclick="sB(${v}e6)">${v}tr</span>`).join(' | ')} | <span style="cursor:pointer;color:var(--bl);font-weight:600" onclick="sB(1e9)">1tỷ</span></div>`;
D.bCats.forEach(c=>{const p=S.bo[c.k]??c.p,a=S.bud*p/100;h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0e8e0;font-size:.8rem"><span style="font-weight:600">${c.l}</span><div style="display:flex;align-items:center;gap:4px"><input type="number" style="width:50px;padding:2px;border:1px solid #ddd;border-radius:3px;text-align:right;font-size:.78rem" value="${p}" min="0" max="100" onchange="uC('${c.k}',this.value)"><span style="font-size:.68rem;color:#888">%</span><span style="color:var(--p);font-weight:700;min-width:50px;text-align:right">${fs(a)}</span></div></div><div style="height:4px;background:#eee;border-radius:2px;margin:2px 0"><div style="height:100%;width:${p}%;background:${c.cl};border-radius:2px"></div></div>`});
let up=D.bCats.reduce((a,c)=>a+(S.bo[c.k]??c.p),0);
h+=`<div style="margin-top:8px;padding:10px;background:#f8f8f8;border-radius:8px;text-align:center;font-size:.82rem">Tổng: <b>${up}%</b> = <b style="color:var(--p)">${fm(S.bud*up/100)}đ</b> | Còn: <b style="color:${100-up>=0?'var(--gn)':'var(--p)'}"> ${fm(S.bud*(100-up)/100)}đ</b></div></div></div>`;return h}

${i===8?`<div style="position:absolute;top:10px;right:10px;left:10px;bottom:10px;border:1px solid ${s.sub};border-radius:8px;opacity:.3;pointer-events:none"></div>`:''}</div>`});

let h=`<div class="pn${idx===S.tab?' a':''}"><div class="c no-print"><h2>📖 Sổ Tay In</h2><button class="btn btn-p" onclick="window.print()">🖨️ In Sổ Tay</button></div>`;

function sT(i){S.tab=i;sv();R()}
function sST(sid,ci){S.st[sid]=ci;sv();const si=D.steps.findIndex(s=>s.id===sid);const p=document.querySelectorAll('.pn')[si];if(!p)return;p.querySelectorAll('.st-i').forEach((t,i)=>t.classList.toggle('a',i===ci));p.querySelectorAll('.sp').forEach((p,i)=>p.classList.toggle('a',i===ci))}
function tC(k,el){S.ck[k]=!S.ck[k];el.classList.toggle('d');sv();const{t,d}=gCk();const p=t?Math.round(d/t*100):0;document.getElementById('mp').style.width=p+'%';document.getElementById('mpt').textContent=p+'% ('+d+'/'+t+')'}
function uB(el){S.bud=parseInt(el.value.replace(/\D/g,''))||0;el.value=fm(S.bud);sv()}
function sB(v){S.bud=v;sv();R()}
function uC(k,v){S.bo[k]=parseFloat(v)||0;sv()}
function goAI(hint){S.tab=D.steps.length+3;sv();R();setTimeout(()=>{const el=document.getElementById('aip');if(el){el.value=hint;el.scrollIntoView({behavior:'smooth'})}},100)}
function aG(){const n=document.getElementById('gn').value.trim();if(!n)return;S.guests.push({n,p:document.getElementById('gp').value.trim(),s:document.getElementById('gs').value,g:document.getElementById('gg').value.trim(),id:++S.gid});sv();R();sT(S.tab)}
function dG(i){S.guests.splice(i,1);sv();R();sT(S.tab)}
function fG(v){const q=v.toLowerCase();document.querySelectorAll('#gT tbody tr').forEach(r=>{r.style.display=(r.dataset.q||'').includes(q)?'':'none'})}
function dlC(){const csv='Họ tên,SĐT,Bên,Nhóm\nNguyễn A,0901234567,trai,Bàn 1\nTrần B,0912345678,gai,Họ hàng';const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='khach_moi_mau.csv';a.click()}
function iC(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{e.target.result.split('\n').slice(1).filter(l=>l.trim()).forEach(l=>{const p=l.split(',').map(s=>s.trim());if(p[0])S.guests.push({n:p[0],p:p[1]||'',s:p[2]||'trai',g:p[3]||'',id:++S.gid})});sv();R();sT(S.tab)};r.readAsText(f,'UTF-8')}
function eC(){let csv='Họ tên,SĐT,Bên,Nhóm\n';S.guests.forEach(g=>csv+=`${g.n},${g.p||''},${g.s},${g.g||''}\n`);const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='khach_moi.csv';a.click()}
function fA(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^### (.*$)/gm,'<h4 style="color:var(--g);margin:6px 0 2px">$1</h4>').replace(/^## (.*$)/gm,'<h3 style="color:var(--g);margin:8px 0 3px">$1</h3>').replace(/^# (.*$)/gm,'<h2 style="color:var(--g2);margin:10px 0 4px">$1</h2>').replace(/^[-*] (.*$)/gm,'<div style="padding:1px 0 1px 8px;border-left:2px solid rgba(255,255,255,.1)">• $1</div>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}
async function cAI(p){if(!S.zk)return alert('Nhập API Key!');const r=document.getElementById('air');r.style.display='block';r.innerHTML='<div style="text-align:center;padding:12px;color:var(--g2)">🤖 Đang xử lý...</div>';
try{const res=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.zk},body:JSON.stringify({model:'glm-4-flash',messages:[{role:'system',content:`Chuyên gia đám cưới VN 20 năm kinh nghiệm. 3 miền. Chi tiết, có giá VNĐ. Budget: ${fs(S.bud)}.`},{role:'user',content:p}],max_tokens:2000,temperature:.7})});
if(!res.ok)throw new Error('API '+res.status);const d=await res.json();const txt=d.choices?.[0]?.message?.content||'Không phản hồi.';S.ar=txt;r.innerHTML=fA(txt);sv()}catch(e){r.innerHTML=`<div style="color:#ff6b6b">❌ ${e.message}</div>`}}
function rAP(i){document.getElementById('aip').value=D.aiP[i].p;cAI(D.aiP[i].p)}
function rAC(){const p=document.getElementById('aip').value.trim();if(p)cAI(p)}
ld();R();
</script>
